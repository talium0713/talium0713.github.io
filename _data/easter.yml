personal_interest_title: "Personal Interest"
personal_interest_sections:
  - heading: "Strategic Games"
    body: "Having peaked at <i style='color:#EC008D'>server rank #9 in Teamfight Tactics (TFT)</i> during a competitive season, I treat strategic games as experimental laboratories for studying decision-making under uncertainty. Competitive multi-agent environments like TFT require continuous adaptation, opponent modeling, and risk-sensitive planning. By analyzing my own high-level gameplay, I study how strategies are formed and adjusted in response to stochastic dynamics and strategic interaction. I am particularly interested in formalizing how these strategies emerge in competitive settings and translating these principles into reinforcement learning agents."
  - heading: "Behavioral Economics and Cognitive Science"
    body: "<i style='color:#EC008D'>Behavioral economics</i> and <i style='color:#EC008D'>cognitive science</i> play a central role in how I think about human decision-making. Many reinforcement learning formulations focus primarily on maximizing expected return, abstracting away inference-time constraints and bounded rationality. I am interested in understanding how human biases, risk perception, and cognitive limitations shape actual decisions. This perspective motivates my research on modeling human-aligned decision processes that go beyond expectation maximization and instead account for uncertainty, regret, and subjective evaluation of outcomes."
  - heading: "Philosophy"
    body: "Since 2020, I have been part of a regular <i style='color:#EC008D'>philosophy gathering</i> called \"Sunday Salon.\" Our dialogues, initially inspired by French \"Baccalauréat\" topics, have expanded to address AI and its societal implications. These discussions have shaped my thinking on human uniqueness, responsibility, and subjective fulfillment. I am focused on understanding which aspects of human reasoning (such as regret, narrative self-reflection, and emotional responses) remain difficult to formalize, and how they might inform the development of human-aligned AI systems."
