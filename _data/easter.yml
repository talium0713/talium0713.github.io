personal_interest_title: "Personal Interest"
personal_interest_sections:
  - heading: "Strategic Games"
    body: "I am a high-level <i>Teamfight Tactics(TFT)</i> player, having ranked within the top 9 during a competitive season. I treat strategic games as experimental laboratories for studying decision-making under uncertainty. Competitive multi-agent environments such as TFT require continuous adaptation, opponent modeling, and risk-sensitive planning. I often reflect on my own gameplay to analyze how strategies are formed, refined, and adjusted in response to stochastic dynamics and strategic interaction. I am particularly interested in formalizing how such strategies emerge in competitive settings and in translating these principles into reinforcement learning agents operating under uncertainty."
  - heading: "Behavioral Economics and Cognitive Science"
    body: "<i>Behavioral economics</i> and <i>cognitive science</i> play a central role in how I think about human decision-making. Many reinforcement learning formulations focus primarily on maximizing expected return, abstracting away inference-time constraints and bounded rationality. I am interested in understanding how human biases, risk perception, and cognitive limitations shape actual decisions. This perspective motivates my research on modeling human-aligned decision processes that go beyond expectation maximization and instead account for uncertainty, regret, and subjective evaluation of outcomes."
  - heading: "Philosophy"
    body: "Since 2020, I have participated in regular philosophical discussions through a group called <i>\"Sunday Salon\"</i>. Our discussions began with themes inspired by the French <i>\"Baccalauréat\"</i> examination topics and have gradually expanded toward questions related to artificial intelligence and its societal implications. These discussions have shaped how I think about human uniqueness, responsibility, and counterfactual reflection. I am particularly interested in understanding what aspects of human reasoning—such as regret, moral evaluation, and narrative self-reflection—remain difficult to formalize, and how these elements might inform the development of human-aligned AI systems."
