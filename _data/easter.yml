personal_interest_title: "Personal Interest"
personal_interest_sections:
  - heading: "Strategic Games"
    body: "I am a high-level Teamfight Tactics (TFT) player, typically finishing within the top ranks of my matches. Games are a valuable source of research inspiration for me. I enjoy reflecting on my own decision process through gameplay and modeling what an optimal strategy should look like under competitive multi-agent scenarios."
  - heading: "Behavioral Economics and Cognitive Science"
    body: "These two fields are central to how I understand human bias and decision-making mechanisms. Reinforcement learning often focuses only on maximizing expected return while ignoring inference-time constraints, and I believe this is a key reason why many modeled policies fail to align with human behavior."
  - heading: "Philosophy"
    body: "Since 2020, I have consistently enjoyed philosophical discussion through a group called \"Sunday Salon\". We began with topics inspired by the French \"Baccalauréat\", and more recently shifted toward AI-related themes and their implications. Personally, I often think about what makes human uniqueness difficult to replace with AI."
